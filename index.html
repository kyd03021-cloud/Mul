<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>물도이일정</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
</head>
<body class="bg-slate-50 h-screen flex flex-col font-sans overflow-hidden select-none">

    <header class="bg-indigo-600 text-white px-4 py-3 shadow-md flex justify-between items-center z-10 shrink-0">
        <h1 class="text-xl font-black tracking-wider">물도이일정</h1>
        <div class="flex gap-2 text-xs font-semibold">
            <button onclick="triggerImport()" class="bg-indigo-700 hover:bg-indigo-800 px-2.5 py-1.5 rounded-lg flex items-center gap-1 transition active:scale-95">📥 불러오기</button>
            <input type="file" id="file-import-input" accept=".html,.json" class="hidden" onchange="importSchedules(event)">
            <button onclick="exportSchedulesToHTML()" class="bg-emerald-600 hover:bg-emerald-700 px-2.5 py-1.5 rounded-lg flex items-center gap-1 transition active:scale-95">📤 다운로드</button>
        </div>
    </header>

    <main class="flex-1 flex flex-col overflow-hidden">
        <section class="w-full bg-white p-4 flex flex-col shadow-sm border-b border-slate-200 shrink-0">
            <div class="flex justify-between items-center mb-3">
                <button id="prev-month" class="px-3 py-2 bg-slate-100 active:bg-slate-200 text-slate-700 font-bold rounded-lg text-sm">&lt; 이전달</button>
                
                <div id="calendar-title-wrap" class="relative cursor-pointer hover:bg-slate-100 px-3 py-1 rounded-xl transition flex items-center gap-1">
                    <h2 id="calendar-title" class="text-lg font-extrabold text-slate-800">2026년 06월</h2>
                    <span class="text-xs text-slate-400">▼</span>
                    
                    <div id="calendar-selects" class="hidden absolute top-full left-1/2 -translate-x-1/2 mt-1 bg-white border border-slate-200 shadow-xl rounded-xl p-3 z-30 flex gap-1 items-center">
                        <select id="select-year" class="text-base font-bold p-1.5 border rounded-lg bg-slate-50 text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"></select>
                        <select id="select-month" class="text-base font-bold p-1.5 border rounded-lg bg-slate-50 text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"></select>
                        <button id="btn-select-confirm" class="text-sm bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-lg font-bold transition">확인</button>
                    </div>
                </div>
                
                <button id="next-month" class="px-3 py-2 bg-slate-100 active:bg-slate-200 text-slate-700 font-bold rounded-lg text-sm">다음달 &gt;</button>
            </div>
            <div class="grid grid-cols-7 gap-1 text-center font-bold text-xs text-slate-400 mb-1">
                <div class="text-red-500">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="text-blue-500">토</div>
            </div>
            <div id="calendar-days" class="grid grid-cols-7 gap-1 min-h-[320px]"></div>
        </section>

        <section class="w-full bg-slate-100 p-4 flex flex-col flex-1 overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h2 class="text-[10px] font-bold text-indigo-600 uppercase tracking-wider">Selected Date</h2>
                    <h3 id="selected-date-title" class="text-lg font-extrabold text-slate-800">2026-06-17</h3>
                </div>
                <button id="open-modal-btn" class="bg-indigo-600 active:bg-indigo-700 text-white font-bold text-sm px-4 py-1 rounded-xl shadow-md flex items-center gap-1 transition active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" /></svg>
                    일정추가
                </button>
            </div>
            <div id="schedule-list" class="space-y-2 pb-12"></div>
        </section>
    </main>

    <div id="schedule-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-end sm:items-center justify-center hidden z-50">
        <div class="bg-white rounded-t-2xl sm:rounded-2xl w-full max-w-md p-5 shadow-2xl transform transition-all translate-y-full sm:translate-y-0 sm:scale-95 duration-200" id="modal-content">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 id="modal-title" class="text-base font-bold text-slate-800">새 일정 추가</h3>
                <button id="close-modal-btn" class="text-slate-400 p-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <form id="schedule-form" class="space-y-3" autocomplete="off">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">날짜</label>
                    <input type="date" id="form-date" required class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-base text-slate-700">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">내용</label>
                    <input type="text" id="form-content" placeholder="일정 내용을 입력하세요" required class="w-full px-3 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-base text-slate-700">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">반복 주기</label>
                    <select id="form-repeat" class="w-full px-3 py-2 border rounded-xl text-base text-slate-700 bg-white">
                        <option value="none">없음</option>
                        <option value="daily">매일</option>
                        <option value="monthly">매월</option>
                        <option value="yearly">매년</option>
                    </select>
                </div>
                <div id="repeat-end-box" class="hidden">
                    <label class="block text-xs font-semibold text-slate-500 mb-1">반복 종료일</label>
                    <input type="date" id="form-repeat-end" class="w-full px-3 py-2 border rounded-xl text-base text-slate-700">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">알림 지정 시간</label>
                    <input type="time" id="form-alert" required class="w-full px-3 py-2 border rounded-xl text-base text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="flex gap-2 justify-end pt-3 border-t mt-4">
                    <button type="button" id="cancel-btn" class="flex-1 py-3 bg-slate-100 text-slate-700 font-medium rounded-xl text-sm active:bg-slate-200">취소</button>
                    <button type="submit" class="flex-1 py-3 bg-indigo-600 text-white font-medium rounded-xl text-sm shadow-md active:bg-indigo-700">저장</button>
                </div>
            </form>
        </div>
    </div>

    <div id="alarm-popup" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center hidden z-[60] px-4">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-5 border border-emerald-100">
            <div class="flex items-center gap-2 mb-3">
                <div class="w-9 h-9 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center text-xl">⏰</div>
                <h3 class="text-lg font-extrabold text-emerald-700">물도이일정 알림</h3>
            </div>
            <p id="alarm-popup-content" class="text-base font-bold text-slate-800 break-words leading-relaxed mb-5"></p>
            <button id="alarm-popup-close" class="w-full py-3 bg-emerald-600 active:bg-emerald-700 text-white font-bold rounded-xl shadow-md">확인</button>
        </div>
    </div>

    <script>
        const solarHolidays = {
            '01-01': '신정', '03-01': '삼일절', '05-05': '어린이날', '06-06': '현충일',
            '08-15': '광복절', '10-03': '개천절', '10-09': '한글날', '12-25': '성탄절'
        };

        const lunarHolidays2026 = {
            '02-16': '설날 연휴', '02-17': '설날', '02-18': '설날 연휴',
            '03-02': '대체공휴일', '05-24': '부처님오신날', '05-25': '대체공휴일',
            '08-17': '대체공휴일', '09-24': '추석 연휴', '09-25': '추석', '09-26': '추석 연휴',
            '10-05': '대체공휴일'
        };

        let today = new Date();
        let currentDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
        
        function formatDate(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }
        
        let selectedDateStr = formatDate(currentDate.getFullYear(), currentDate.getMonth(), currentDate.getDate());
        let schedules = [];
        
        try {
            const rawData = localStorage.getItem('muldoi_schedules');
            schedules = rawData ? JSON.parse(rawData) : [];
            if (!Array.isArray(schedules)) schedules = [];
        } catch (e) {
            schedules = [];
        }

        let editingScheduleId = null;
        let lastCheckedMinute = ""; 
        let globalAudioCtx = null;

        const calendarDays = document.getElementById('calendar-days');
        const calendarTitle = document.getElementById('calendar-title');
        const selectedDateTitle = document.getElementById('selected-date-title');
        const scheduleList = document.getElementById('schedule-list');
        const scheduleModal = document.getElementById('schedule-modal');
        const modalContent = document.getElementById('modal-content');
        const scheduleForm = document.getElementById('schedule-form');
        const formRepeat = document.getElementById('form-repeat');
        const repeatEndBox = document.getElementById('repeat-end-box');
        const selectYear = document.getElementById('select-year');
        const selectMonth = document.getElementById('select-month');

        for (let y = 2000; y <= 2050; y++) {
            const opt = document.createElement('option'); opt.value = y; opt.textContent = `${y}년`;
            selectYear.appendChild(opt);
        }
        for (let m = 0; m < 12; m++) {
            const opt = document.createElement('option'); opt.value = m; opt.textContent = `${m + 1}월`;
            selectMonth.appendChild(opt);
        }

        function getSchedulesForDate(dateStr) {
            if (!dateStr) return [];
            const [tYear, tMonth, tDay] = dateStr.split('-').map(Number);
            
            return schedules.filter(s => {
                if (!s || !s.date || typeof s.date !== 'string') return false;
                if (s.exceptions && s.exceptions.includes(dateStr)) return false;

                if (s.date === dateStr) return true;
                if (s.repeat === 'none' || !s.repeat) return false;
                if (s.date > dateStr) return false;
                if (s.repeatEnd && s.repeatEnd < dateStr) return false;

                const parts = s.date.split('-');
                if (parts.length < 3) return false;
                const [, sMonth, sDay] = parts.map(Number);

                if (s.repeat === 'daily') return true;

                if (s.repeat === 'monthly') {
                    const lastDayOfTargetMonth = new Date(tYear, tMonth, 0).getDate();
                    if (sDay === tDay) return true;
                    if (sDay > lastDayOfTargetMonth && tDay === lastDayOfTargetMonth) return true;
                    return false;
                }

                if (s.repeat === 'yearly') {
                    if (sMonth === 2 && sDay === 29) {
                        const isLeapYear = (tYear % 4 === 0 && tYear % 100 !== 0) || (tYear % 400 === 0);
                        if (!isLeapYear && tMonth === 2 && tDay === 28) return true;
                    }
                    return sMonth === tMonth && sDay === tDay;
                }
                return false;
            });
        }

        function exportSchedulesToHTML() {
            if (schedules.length === 0) { alert('저장할 일정이 없습니다.'); return; }
            const repeatLabels = { none: '단발성', daily: '매일', monthly: '매월', yearly: '매년' };
            
            let tableRows = schedules.map(s => {
                return `
                <tr style="border-bottom: 1px solid #e2e8f0;">
                    <td style="padding: 12px; font-size: 14px; color: #475569;">${s.date || ''}</td>
                    <td style="padding: 12px; font-size: 14px; font-weight: bold; color: #1e293b;">${s.content || ''}</td>
                    <td style="padding: 12px; font-size: 14px; color: #475569;">${repeatLabels[s.repeat] || '없음'} ${s.repeatEnd ? `(~${s.repeatEnd})` : ''}</td>
                    <td style="padding: 12px; font-size: 14px; color: #b45309; font-weight: 500;">${s.alert || '09:00'}</td>
                </tr>`;
            }).join('');

            const template = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>물도이일정 백업</title><style>body{font-family:sans-serif;background:#f8fafc;padding:24px;}.container{max-width:600px;margin:0 auto;background:white;padding:20px;border-radius:16px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);}h2{color:#4f46e5;border-bottom:2px solid #e2e8f0;padding-bottom:10px;}table{width:100%;border-collapse:collapse;margin-top:15px;}th{background:#f1f5f9;padding:10px;font-size:13px;color:#64748b;}td{padding:12px;border-bottom:1px solid #e2e8f0;}</style></head><body><div class="container"><h2>물도이일정 백업 리포트</h2><table><thead><tr><th>시작일</th><th>내용</th><th>반복</th><th>알림 시간</th></tr></thead><tbody>${tableRows}</tbody></table></div><script id="muldoi-raw-backup" type="application/json">${JSON.stringify(schedules)}<\/script></body></html>
